name: Secrets scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed so `gitleaks detect` can scan past commits
          # on push-to-main runs.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" gitleaks
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Scan for secrets
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Scan only commits introduced by this PR — fast and targeted.
            git fetch origin "${{ github.base_ref }}" --depth=50 --quiet
            gitleaks detect \
              --redact \
              --no-banner \
              --exit-code=1 \
              --log-opts="origin/${{ github.base_ref }}..HEAD"
          else
            # Push to main: scan full history.
            gitleaks detect --redact --no-banner --exit-code=1
          fi
