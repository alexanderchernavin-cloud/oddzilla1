# Single source of truth for the Android app version. Bumped by
# scripts/release.ps1 on every release. The build reads these values
# in app/build.gradle.kts and stamps them into BuildConfig +
# AndroidManifest, so UpdateChecker can compare against /app/version.json.
#
# versionCode is a monotonically increasing integer; the Update flow
# treats `manifest.versionCode > BuildConfig.VERSION_CODE` as
# "newer build available". versionName is human display only.
versionCode=10
versionName=0.5.5
