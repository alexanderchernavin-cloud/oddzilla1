# Oddzilla — single-box Docker Compose (Hetzner CPX31 target;
# upgraded from CPX22 on 2026-05-11). Every service is designed so it
# can be moved to a separate box by changing hostnames in `.env`; no
# localhost assumptions in code.

name: oddzilla

x-healthcheck-defaults: &hc
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 10s

# Per-service log rotation. Without this the JSON log driver writes
# unbounded files into /var/lib/docker/containers/*-json.log and one
# busy service (feed-ingester during AMQP recovery) can fill the box's
# disk over a few days. See project_disk_full_incident memory.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Sandbox profile applied to every long-running service. cap_drop ALL
# strips the default Linux capability set; only the few services that
# need a capability re-add it explicitly. no-new-privileges blocks any
# in-container exec from regaining a capability via setuid.
x-sandbox: &sandbox
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL

x-go-service: &go-service
  <<: *sandbox
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file: .env
  logging: *default-logging
  mem_limit: 320m
  # CPU cap per Go service. Box is 2 vCPU; without caps a runaway loop
  # in any one service starves the rest (an admin endpoint seq-scanning
  # a hot table has been observed pegging both cores and dropping
  # ws-gateway / feed-ingester to milliseconds). Per-service caps
  # oversubscribe in aggregate (sum > 2.0) which is fine — they only
  # bind under contention.
  cpus: 0.75

x-ts-service: &ts-service
  <<: *sandbox
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file: .env
  logging: *default-logging

# Next.js storefront runs as N identical replicas fronted by Caddy
# (lb_policy least_conn). SSR is single-threaded per Node process; one
# replica saturates one vCPU under load. Three replicas use ~3 of the
# 4 vCPU on CPX31, leaving one core for api / postgres / ws-gateway.
# Per-replica mem_limit is sized so 3× sums under 1.5 GiB, well within
# the 8 GiB box budget. The image, env, and healthcheck are all
# identical — only the REPLICA_NAME differs so a log line identifies
# which container produced it.
x-web: &web-base
  <<: *sandbox
  restart: unless-stopped
  logging: *default-logging
  mem_limit: 400m
  cpus: 0.75
  build:
    context: .
    dockerfile: apps/web/Dockerfile
  env_file: .env
  depends_on:
    - api
    - ws-gateway
  healthcheck:
    <<: *hc
    test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WEB_PORT:-3000}/healthz"]

services:
  postgres:
    # Pinned by manifest-list digest. Refresh: docker buildx imagetools
    # inspect postgres:16-alpine.
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1024m
    cpus: 1.5
    security_opt:
      - "no-new-privileges:true"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oddzilla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-oddzilla}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"      # localhost-only; Caddy never fronts this
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-oddzilla} -d $${POSTGRES_DB:-oddzilla}"]
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"

  redis:
    image: redis:7-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 320m
    cpus: 0.5
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The redis-alpine entrypoint uses setpriv to drop from root to
    # the `redis` user. With cap_drop:ALL + no-new-privileges, setpriv
    # fails on Docker Desktop ≥ 29 with "setresuid: Operation not
    # permitted" and the container crashloops before redis starts.
    # SETUID/SETGID are the minimum two capabilities the entrypoint
    # needs; no-new-privileges still blocks privilege escalation
    # post-exec, so the security posture is unchanged in practice.
    cap_add:
      - SETUID
      - SETGID
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "ping"]

  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 96m
    cpus: 0.5
    # Caddy needs to bind privileged ports 80 and 443. cap_drop ALL strips
    # every capability and we only re-add NET_BIND_SERVICE so a Caddy RCE
    # cannot, for example, modify routing tables (NET_ADMIN) or read raw
    # sockets (NET_RAW). no-new-privileges blocks regaining anything via
    # in-container setuid binaries.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      # Static APK distribution for the Android app. /srv/oddzilla-apk
      # on the host holds version.json + oddzilla-<version>.apk files;
      # a release is `scp` + edit-version.json (no Caddy restart). The
      # mount is read-only so a Caddy RCE can't tamper with installer
      # bytes en route to user devices. Bootstrap the directory once
      # via infra/hetzner/oddzilla-apk-init.sh.
      - /srv/oddzilla-apk:/srv/oddzilla-apk:ro
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST:-localhost}
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    depends_on:
      # web1 always runs; web2 + web3 join under the `scaled` profile in
      # production. Caddy's active health checks ride out their startup
      # gap — listing them as deps would tangle dev (no `scaled` profile)
      # into an unresolvable wait.
      - web1
      - api
      - ws-gateway

  signer:
    # Holds HD_MASTER_MNEMONIC. The API and the (future) withdrawal
    # broadcaster talk to it over a Unix socket on a shared volume —
    # never over the network. cap_drop ALL + no-new-privileges + a
    # read_only rootfs mean RCE inside this container yields a process
    # that cannot escalate, persist anywhere, or reach the internet.
    # The mnemonic itself is unset from the environment as soon as the
    # binary parses it (see cmd/signer/main.go), so /proc/<pid>/environ
    # is uninteresting after boot. The container runs as UID 1000
    # directly (matches signer-socket's pre-owned tmpfs) so we never
    # need CAP_CHOWN.
    build:
      context: ./services/signer
      dockerfile: Dockerfile
    user: "1000:1000"
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64m
    cpus: 0.25
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    env_file: .env
    environment:
      SIGNER_SOCKET_PATH: /run/signer/signer.sock
      HEALTH_PORT: 8086
    volumes:
      - signer-socket:/run/signer
    # Host port binding lives in docker-compose.dev.yml — prod exposes
    # only Caddy on 80/443. The api talks to the signer via the Unix
    # socket on signer-socket; nothing else needs the health port.
    healthcheck:
      <<: *hc
      # Distroless static has no wget/curl. The signer binary supports
      # a -healthcheck self-probe that dials its own /healthz and exits 0/1.
      test: ["CMD", "/signer", "-healthcheck"]

  api:
    <<: *ts-service
    mem_limit: 512m
    cpus: 1.0
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      SERVICE_NAME: api
      PORT: ${API_PORT:-3001}
      SIGNER_SOCKET_PATH: /run/signer/signer.sock
    volumes:
      # Read-write because Unix socket clients need to write to the socket
      # file to send requests. cap_drop + the API's existing isolation are
      # the security boundary, not the mount mode.
      - signer-socket:/run/signer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      signer:
        condition: service_healthy
    # Host port binding lives in docker-compose.dev.yml — prod exposes only
    # Caddy on 80/443. Healthcheck below uses the container's own loopback.
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${API_PORT:-3001}/healthz"]

  ws-gateway:
    <<: *ts-service
    mem_limit: 256m
    cpus: 0.5
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      SERVICE_NAME: ws-gateway
      PORT: ${WS_GATEWAY_PORT:-3002}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WS_GATEWAY_PORT:-3002}/healthz"]

  web1:
    <<: *web-base
    container_name: oddzilla-web1
    environment:
      PORT: ${WEB_PORT:-3000}
      # Next.js standalone reads HOSTNAME for the bind address. Default is
      # the container's hostname (resolves to eth0 only), which makes the
      # container's loopback healthcheck fail. 0.0.0.0 binds to all ifaces.
      HOSTNAME: 0.0.0.0
      # Shared with Caddy so the app can recognize admin-backoffice requests
      # (e.g. suppress the signup surface there).
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
      # REPLICA_NAME lands in every log line emitted from middleware +
      # server-fetch. Combined with the x-request-id header propagated
      # from Caddy → web → api, a single grep finds the SSR render and
      # every API call it triggered, regardless of which replica
      # produced it.
      REPLICA_NAME: web1

  # web2 + web3 are gated on the `scaled` profile so local dev runs a
  # single replica without the cost of three Node processes. Production
  # deploy commands include `--profile scaled` (see CLAUDE.md) so all
  # three come up under one Caddy upstream.
  web2:
    <<: *web-base
    container_name: oddzilla-web2
    profiles: [scaled]
    environment:
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
      REPLICA_NAME: web2

  web3:
    <<: *web-base
    container_name: oddzilla-web3
    profiles: [scaled]
    environment:
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
      REPLICA_NAME: web3

  feed-ingester:
    <<: *go-service
    build:
      context: ./services/feed-ingester
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: feed-ingester
      HEALTH_PORT: ${FEED_INGESTER_HEALTH_PORT:-8081}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${FEED_INGESTER_HEALTH_PORT:-8081}/healthz"]

  odds-publisher:
    <<: *go-service
    build:
      context: ./services/odds-publisher
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: odds-publisher
      HEALTH_PORT: ${ODDS_PUBLISHER_HEALTH_PORT:-8082}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${ODDS_PUBLISHER_HEALTH_PORT:-8082}/healthz"]

  settlement:
    <<: *go-service
    build:
      context: ./services/settlement
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: settlement
      HEALTH_PORT: ${SETTLEMENT_HEALTH_PORT:-8083}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${SETTLEMENT_HEALTH_PORT:-8083}/healthz"]

  bet-delay:
    <<: *go-service
    build:
      context: ./services/bet-delay
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: bet-delay
      HEALTH_PORT: ${BET_DELAY_HEALTH_PORT:-8084}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${BET_DELAY_HEALTH_PORT:-8084}/healthz"]

  wallet-watcher:
    <<: *go-service
    build:
      context: ./services/wallet-watcher
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: wallet-watcher
      HEALTH_PORT: ${WALLET_WATCHER_HEALTH_PORT:-8085}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WALLET_WATCHER_HEALTH_PORT:-8085}/healthz"]

  metrics-collector:
    # Read-only host-metrics service. Holds the three sensitive bind
    # mounts (host /proc, host /, docker.sock) so the api container
    # doesn't have to. cap_drop ALL + no_new_privileges + read_only
    # rootfs + nobody-UID isolation: an RCE here yields a process that
    # cannot escalate, persist anywhere, or call the docker engine for
    # writes (the .sock mount is :ro). Listens on the docker default
    # network only — Caddy never fronts it; only the api container has
    # a reason to reach :9090.
    build:
      context: ./services/metrics-collector
      dockerfile: Dockerfile
    user: "65534:65534"
    # The docker.sock is owned by root:docker mode 660 on the host;
    # UID 65534 (nobody) needs to be in the `docker` group to read it.
    # Hetzner CPX22 dockerd assigns GID 988 (`getent group docker`);
    # adjust if redeploying elsewhere. Note: docker.sock access is
    # functionally equivalent to root on the host (the bind-mount `:ro`
    # only protects the socket *file*, not the engine API), so this
    # container's hardening (cap_drop ALL + no_new_privileges +
    # read_only rootfs + UID nobody) is the only thing standing between
    # an RCE here and a privileged container escape. Future
    # tightening: front docker.sock with tecnativa/docker-socket-proxy
    # so this container only sees a filtered subset (GET /containers).
    group_add:
      - "988"
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64m
    cpus: 0.25
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    environment:
      SERVICE_NAME: metrics-collector
      PORT: ${METRICS_COLLECTOR_PORT:-9090}
    volumes:
      # Host /proc → /host/proc:ro for cpu/mem/load/uptime reads.
      - /proc:/host/proc:ro
      # Host root → /host-root:ro for statvfs() on the disk that matters
      # (the Hetzner box's /dev/sda1). `rslave` is required by dockerd
      # whenever the bind source overlaps the daemon root
      # (`/var/lib/docker`); rprivate is rejected. Slave propagation
      # means host mount events propagate INTO the container (so a
      # newly mounted disk shows up live) but no events propagate
      # back OUT — which is what we want for a read-only monitoring
      # mount.
      - /:/host-root:ro,rslave
      # Docker engine API for the container list. :ro so a future
      # exploit cannot `docker run --privileged` from this container.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      <<: *hc
      # Distroless static has no wget/curl. The binary supports a
      # -healthcheck self-probe that dials its own /healthz and exits 0/1.
      test: ["CMD", "/metrics-collector", "-healthcheck"]

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  # Shared between signer (writes the socket file) and api (read-only
  # mount). Tmpfs so the socket lives in RAM only — restart of the
  # signer recreates it; nothing about the secret material survives a
  # crash on disk.
  signer-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # Pre-own the tmpfs volume to UID 1000 / GID 1000 (the signer +
      # api containers' non-root user) so the signer process can create
      # the socket file without needing CAP_CHOWN — which we strip via
      # cap_drop ALL on every service.
      o: "size=4m,mode=750,uid=1000,gid=1000"
