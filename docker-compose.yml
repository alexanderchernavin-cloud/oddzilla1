# Oddzilla — single-box Docker Compose (Hetzner CPX22 target).
# Every service is designed so it can be moved to a separate box by
# changing hostnames in `.env`; no localhost assumptions in code.

name: oddzilla

x-healthcheck-defaults: &hc
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 10s

# Per-service log rotation. Without this the JSON log driver writes
# unbounded files into /var/lib/docker/containers/*-json.log and one
# busy service (feed-ingester during AMQP recovery) can fill the box's
# disk over a few days. See project_disk_full_incident memory.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Sandbox profile applied to every long-running service. cap_drop ALL
# strips the default Linux capability set; only the few services that
# need a capability re-add it explicitly. no-new-privileges blocks any
# in-container exec from regaining a capability via setuid.
x-sandbox: &sandbox
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL

x-go-service: &go-service
  <<: *sandbox
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file: .env
  logging: *default-logging
  mem_limit: 320m

x-ts-service: &ts-service
  <<: *sandbox
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file: .env
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1024m
    security_opt:
      - "no-new-privileges:true"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oddzilla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-oddzilla}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"      # localhost-only; Caddy never fronts this
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-oddzilla} -d $${POSTGRES_DB:-oddzilla}"]
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 320m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "ping"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 96m
    # Caddy needs to bind privileged ports 80 and 443. cap_drop ALL strips
    # every capability and we only re-add NET_BIND_SERVICE so a Caddy RCE
    # cannot, for example, modify routing tables (NET_ADMIN) or read raw
    # sockets (NET_RAW). no-new-privileges blocks regaining anything via
    # in-container setuid binaries.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST:-localhost}
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    depends_on:
      - web
      - api
      - ws-gateway

  api:
    <<: *ts-service
    mem_limit: 512m
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      SERVICE_NAME: api
      PORT: ${API_PORT:-3001}
    # Host port binding lives in docker-compose.dev.yml — prod exposes only
    # Caddy on 80/443. Healthcheck below uses the container's own loopback.
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${API_PORT:-3001}/healthz"]

  ws-gateway:
    <<: *ts-service
    mem_limit: 256m
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      SERVICE_NAME: ws-gateway
      PORT: ${WS_GATEWAY_PORT:-3002}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WS_GATEWAY_PORT:-3002}/healthz"]

  web:
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 640m
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      PORT: ${WEB_PORT:-3000}
      # Next.js standalone reads HOSTNAME for the bind address. Default is
      # the container's hostname (resolves to eth0 only), which makes the
      # container's loopback healthcheck fail. 0.0.0.0 binds to all ifaces.
      HOSTNAME: 0.0.0.0
      # Shared with Caddy so the app can recognize admin-backoffice requests
      # (e.g. suppress the signup surface there).
      ADMIN_HOST: ${ADMIN_HOST:-admin.localhost}
    depends_on:
      - api
      - ws-gateway
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WEB_PORT:-3000}"]

  feed-ingester:
    <<: *go-service
    build:
      context: ./services/feed-ingester
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: feed-ingester
      HEALTH_PORT: ${FEED_INGESTER_HEALTH_PORT:-8081}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${FEED_INGESTER_HEALTH_PORT:-8081}/healthz"]

  odds-publisher:
    <<: *go-service
    build:
      context: ./services/odds-publisher
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: odds-publisher
      HEALTH_PORT: ${ODDS_PUBLISHER_HEALTH_PORT:-8082}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${ODDS_PUBLISHER_HEALTH_PORT:-8082}/healthz"]

  settlement:
    <<: *go-service
    build:
      context: ./services/settlement
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: settlement
      HEALTH_PORT: ${SETTLEMENT_HEALTH_PORT:-8083}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${SETTLEMENT_HEALTH_PORT:-8083}/healthz"]

  bet-delay:
    <<: *go-service
    build:
      context: ./services/bet-delay
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: bet-delay
      HEALTH_PORT: ${BET_DELAY_HEALTH_PORT:-8084}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${BET_DELAY_HEALTH_PORT:-8084}/healthz"]

  wallet-watcher:
    <<: *go-service
    build:
      context: ./services/wallet-watcher
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: wallet-watcher
      HEALTH_PORT: ${WALLET_WATCHER_HEALTH_PORT:-8085}
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WALLET_WATCHER_HEALTH_PORT:-8085}/healthz"]

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
